{% extends 'base.html' %}

{% block title %}Пароль восстановлен - Доска объявлений{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="bi bi-check-circle"></i> Пароль восстановлен</h4>
                </div>
                <div class="card-body text-center">
                    <i class="bi bi-shield-check display-1 text-success"></i>
                    <h3 class="mt-3">Пароль успешно изменен!</h3>
                    <p class="text-muted">Теперь вы можете войти в систему с новым паролем.</p>
                    <div class="d-grid gap-2 mt-4">
                        <a href="{% url 'login' %}" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right"></i> Войти в аккаунт
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
