{% extends 'base.html' %}

{% block title %}Пароль изменен - Доска объявлений{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="bi bi-check-circle"></i> Пароль изменен</h4>
                </div>
                <div class="card-body text-center">
                    <i class="bi bi-shield-check display-1 text-success"></i>
                    <h3 class="mt-3">Пароль успешно изменен!</h3>
                    <p class="text-muted">Ваш пароль был обновлен. Теперь вы можете войти с новым паролем.</p>
                    {% comment %} <div class="d-grid gap-2 mt-4">
                        <a href="{% url 'users:profile' %}" class="btn btn-primary">
                            <i class="bi bi-person"></i> Вернуться в профиль
                        </a>
                    </div> {% endcomment %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
