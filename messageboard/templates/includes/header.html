{% load static %}

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="{% url 'board:ad_list' %}">
            <i class="bi bi-grid-3x3-gap-fill"></i> Доска объявлений
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'board:ad_list' %}">
                        <i class="bi bi-house"></i> Главная
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'board:search' %}">
                        <i class="bi bi-search"></i> Поиск
                    </a>
                </li>
            </ul>
            <ul class="navbar-nav">
                {% if user.is_authenticated %}
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i> {{ user.username }}
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li>
                                <a class="dropdown-item" href="{% url 'board:ad_create' %}">
                                    <i class="bi bi-plus-circle"></i> Создать объявление
                                </a>
                            </li>
                            <li>
                                <a class="dropdown-item" href="{% url 'users:profile' %}">
                                    <i class="bi bi-person"></i> Мой профиль
                                </a>
                            </li>
                            <li><hr class="dropdown-divider"></li>
                            {% if user.is_superuser %}
                                <li>
                                    <a class="dropdown-item" href="{% url 'admin:index' %}">
                                        <i class="bi bi-gear"></i> Админка
                                    </a>
                                </li>
                            {% endif %}
                            <li>
                                <form method="post" action="{% url 'users:logout' %}" class="d-inline">
                                    {% csrf_token %}
                                    <button type="submit" class="dropdown-item">
                                        <i class="bi bi-box-arrow-right"></i> Выйти
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'users:login' %}">
                            <i class="bi bi-box-arrow-in-right"></i> Вход
                        </a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>
