{% extends 'base.html' %}

{% block title %}Удаление объявления{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0"><i class="bi bi-exclamation-triangle"></i> Подтверждение удаления</h4>
                </div>
                <div class="card-body">
                    <p class="fs-5">Вы действительно хотите удалить объявление?</p>
                    <div class="alert alert-warning">
                        <strong>{{ object.title }}</strong><br>
                        {{ object.description|truncatewords:30 }}
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'board:ad_detail' object.pk %}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Отмена
                            </a>
                            <button type="submit" class="btn btn-danger">
                                <i class="bi bi-trash"></i> Да, удалить
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
